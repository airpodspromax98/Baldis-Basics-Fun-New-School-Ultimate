<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Clever | Portal</title>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/bfnsu/">
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    /* 1. RESET & THEME */
    body, html {
      margin: 0 !important;
      padding: 0 !important;
      background-color: #000000 !important;
      overflow: hidden !important;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    /* 2. FORCED WHITE TOP BAR (Matches your other games) */
    #topbar {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 60px !important;
      background-color: #ffffff !important;
      background: #ffffff !important;
      display: flex !important;
      align-items: center !important;
      padding: 0 15px !important;
      z-index: 999999 !important;
      box-sizing: border-box !important;
      border: none !important;
    }

    #topbar img { height: 40px !important; margin-right: 12px !important; }

    #topbar a {
      color: #000000 !important;
      text-decoration: none !important;
      font-size: 20px !important;
      font-weight: 500 !important;
    }

    /* 3. GAME CONTAINER */
    #unity-container {
      position: absolute !important;
      top: 60px !important; /* Below the bar */
      left: 0 !important;
      width: 100% !important;
      height: calc(100% - 60px) !important;
      background: #000 !important;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      background: #000 !important;
      display: block !important;
    }

    /* Kill any default blue elements or footers */
    #unity-footer, #unity-loading-bar, .progress {
      background: none !important;
    }
    
    #unity-progress-bar-full {
      background: #ffffff !important; /* Changes the blue loading bar to white */
    }

    #unity-loading-bar {
      position: absolute;
      bottom: 20%;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
    <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
  </div>

  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");

    // 4. THE 360-SPIN FIX
    canvas.addEventListener("mousedown", () => {
      canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
      canvas.requestPointerLock();
    });

    // --- Original Asset Merging Logic ---
    window.mergedBlobUrls = {};
    window.assetsReady = false;

    async function mergeSplitFile(fileUrlBase, numParts) {
      const partUrls = Array.from({ length: numParts }, (_, i) => `${fileUrlBase}.part${i + 1}`);
      try {
        const responses = await Promise.all(partUrls.map(url => fetch(url)));
        if (responses.some(r => !r.ok)) return null;
        const parts = await Promise.all(responses.map(r => r.arrayBuffer()));
        const combinedBlob = new Blob(parts, { type: 'application/octet-stream' });
        return URL.createObjectURL(combinedBlob);
      } catch (error) { return null; }
    }

    function setupInterceptors() {
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
        for (const [filename, blobUrl] of Object.entries(window.mergedBlobUrls)) {
          if (url.includes(filename)) { url = blobUrl; break; }
        }
        return originalOpen.call(this, method, url, ...args);
      };
    }

    async function prepareGameAssets() {
      setupInterceptors();
      const filesToMerge = [
        { filename: 'Build/BFNSPUE Alpha 6 Part 2b WebGL.data', parts: 9 },
        { filename: 'Build/BFNSPUE Alpha 6 Part 2b WebGL.wasm', parts: 2 }
      ];
      for (const file of filesToMerge) {
        const blobUrl = await mergeSplitFile(file.filename, file.parts);
        if (blobUrl) window.mergedBlobUrls[file.filename] = blobUrl;
      }
      window.assetsReady = true;
    }

    // --- Load Game ---
    prepareGameAssets().then(() => {
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/BFNSPUE Alpha 6 Part 2b WebGL.loader.js";
      var config = {
        dataUrl: buildUrl + "/BFNSPUE Alpha 6 Part 2b WebGL.data",
        frameworkUrl: buildUrl + "/BFNSPUE Alpha 6 Part 2b WebGL.framework.js",
        codeUrl: buildUrl + "/BFNSPUE Alpha 6 Part 2b WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "JohnsterSpaceGames",
        productName: "Baldi's Fun New School Plus Ultimate Edition",
        productVersion: "0.2.5b",
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        });
      };
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
